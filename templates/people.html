{% extends "layout.html" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card card-shadow">
        <div class="card-body">
          <h2 class="card-title">Manage people</h2>
          <p class="text-muted">Enter exactly 4 flatmate names, separated by commas.</p>
          <form method="post" action="{{ url_for('people') }}">
            <div class="mb-3">
              <label class="form-label">People</label>
              <input type="text" class="form-control" name="people" value="{{ data.people | join(', ') }}" required>
              <div class="form-text">Example: Alice, Bob, Charlie, Dana</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Save names</button>
          </form>
            {% if g.user %}
              <form method="post" action="{{ url_for('force_pin_reset') }}" class="mt-3">
                <button type="submit" class="btn btn-outline-danger w-100">Force PIN reset for all users</button>
              </form>
            {% endif %}
        </div>
      </div>
    </div>
  </div>
{% endblock %}
