{% extends "layout.html" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card card-shadow">
        <div class="card-body">
          <h2 class="card-title">Add purchase</h2>
          <p class="text-muted">Enter purchase details when someone buys eggs.</p>
          <form method="post" action="{{ url_for('purchase') }}">
            <div class="mb-3">
              <label class="form-label">Buyer</label>
              <select class="form-select" name="buyer" required>
                <option value="" selected disabled>Select buyer</option>
                {% for person in data.people %}
                  <option value="{{ person }}">{{ person }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Eggs purchased</label>
              <input type="number" class="form-control" name="eggs" min="1" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Total cost</label>
              <input type="number" step="0.01" class="form-control" name="cost" min="0.01" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="datetime-local" class="form-control" name="date">
              <div class="form-text">Leave blank to use the current time.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Save purchase</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
